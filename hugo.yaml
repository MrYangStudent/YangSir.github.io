baseURL: "https://mryangstudent.github.io/YangSir.github.io/"
locale: "zh-cn"
title: "YangSir's Tech Blog"
theme: "PaperMod"

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
hasCJKLanguage: true

params:
  author: "YangSir"
  description: "记录技术学习与项目实践的个人博客"
  
  # 主页配置（由自定义 layouts/index.html 渲染）
  profileMode:
    enabled: true
    title: "Hi there 👋"
    subtitle: "一名拥有 7 年开发经验的工程师，深耕 Go、Python 后端开发，目前专注于大模型（LLM）相关技术学习。在这里记录技术探索、项目实践与学习心得。"
    imageUrl: ""
    imageTitle: ""
    buttons:
      - name: "阅读文章"
        url: "/posts/"
      - name: "关于我"
        url: "/about/"
  
  # 社交链接
  socialIcons:
    - name: github
      url: "https://github.com/MrYangStudent"
    - name: email
      url: "mailto:yxiansheng907@gmail.com"
  
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  ShowToc: true
  ShowFullTextinRSS: true
  
  # 评论系统 (可选，后续可启用)
  # comments: true
  
  defaultTheme: auto
  disableThemeToggle: false
  mainSections:
    - posts
markup:
  highlight:
    style: "monokai"
    noClasses: false
    lineNos: true
  goldmark:
    renderer:
      unsafe: true

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: search
      name: 搜索
      url: /search/
      weight: 30
    - identifier: about
      name: 关于
      url: /about/
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON
